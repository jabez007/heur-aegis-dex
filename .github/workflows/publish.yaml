name: Use Shared Action to Publish

on:
  release:
    types:
      - published

jobs:
  publish_to_npm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for Trusted Publishers (OIDC)
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Publish to NPM
        run: npm publish --provenance --access public

  upload-to-release:
    runs-on: ubuntu-latest
    needs: publish_to_npm # Only upload to release if publish succeeds
    permissions:
      contents: write # Required to upload assets to the release
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Zip library artifacts
        run: zip -r heur-aegis-dex-lib.zip lib/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: heur-aegis-dex-lib.zip
          fail_on_unmatched_files: true

  publish_to_ghpr:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Shared Publish to GHPR
        uses: McCann-Hub/create-typescript-template/.github/shared/ghpr/publish@master
        with:
          node_version: 22.x
        env:
          GHPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
